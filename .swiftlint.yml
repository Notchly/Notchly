disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - joined_default_parameter
  - modifier_order
  - redundant_nil_coalescing
  - sorted_first_last
  - vertical_parameter_alignment_on_call

included:
  - Notchly

excluded:
  - DerivedData
  - .build
  - Packages
  - Pods

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 90

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

type_name:
  min_length: 3
  max_length:
    warning: 40
    error: 50

nesting:
  type_level:
    warning: 2

cyclomatic_complexity:
  warning: 12
  error: 20

reporter: "xcode"
